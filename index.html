<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eminanne Sabunları</title>
<style>
  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#f5fff7,#eaf8ee);
    color:#1f4d2c;
  }

  .screen{
    display:none;
    min-height:100vh;
    padding:30px 20px 50px;
    text-align:center;
  }

  .screen.active{
    display:block;
  }

  .container{
    max-width:1000px;
    margin:0 auto;
  }

  h1{
    margin:20px 0 10px;
    font-size:clamp(30px,6vw,54px);
    color:#2e7d32;
  }

  .subtitle{
    font-size:clamp(18px,3vw,24px);
    color:#356c43;
    margin-bottom:12px;
    font-weight:bold;
  }

  .line{
    font-size:clamp(18px,3vw,24px);
    margin:10px 0;
    color:#245c28;
  }

  button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    background:#2e7d32;
    color:white;
    font-size:17px;
    cursor:pointer;
    margin:10px 6px;
    font-weight:bold;
  }

  button.secondary{
    background:#d9f0df;
    color:#2e7d32;
  }

  .card{
    background:rgba(255,255,255,0.9);
    border-radius:24px;
    padding:24px;
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
  }

  /* SABUN ANİMASYONU */
  .soap-area{
    position:relative;
    width:240px;
    height:180px;
    margin:0 auto 20px;
  }

  .soap{
    width:120px;
    height:74px;
    background:linear-gradient(145deg,#fff8d8,#efdc98);
    border-radius:24px;
    position:absolute;
    left:60px;
    top:78px;
    box-shadow:0 10px 18px rgba(0,0,0,0.14);
    animation:soapMove 3s ease-in-out infinite;
  }

  .soap::before{
    content:"";
    position:absolute;
    width:76px;
    height:20px;
    background:rgba(255,255,255,0.45);
    border-radius:20px;
    top:10px;
    left:22px;
  }

  .bubble{
    position:absolute;
    bottom:50px;
    background:rgba(255,255,255,0.7);
    border:2px solid rgba(255,255,255,0.85);
    border-radius:50%;
    animation:floatBubble 3s linear infinite;
  }

  .b1{ width:18px; height:18px; left:42px; animation-delay:0s; }
  .b2{ width:13px; height:13px; left:92px; animation-delay:.8s; }
  .b3{ width:22px; height:22px; left:154px; animation-delay:1.5s; }
  .b4{ width:14px; height:14px; left:190px; animation-delay:2.1s; }

  @keyframes soapMove{
    0%,100%{ transform:translateY(0) rotate(-4deg); }
    50%{ transform:translateY(-8px) rotate(4deg); }
  }

  @keyframes floatBubble{
    0%{
      transform:translateY(0) scale(0.8);
      opacity:0;
    }
    20%{
      opacity:1;
    }
    100%{
      transform:translateY(-90px) scale(1.2);
      opacity:0;
    }
  }

  .map-wrap{
    margin-top:20px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 24px rgba(0,0,0,0.1);
  }

  iframe{
    width:100%;
    height:320px;
    border:0;
  }

  .info-text{
    font-size:20px;
    margin:10px 0;
    color:#143d74;
  }

  @media (max-width:600px){
    .soap-area{
      transform:scale(0.92);
    }

    iframe{
      height:260px;
    }
  }
</style>
</head>
<body>

<!-- ANA SAYFA -->
<section id="homeScreen" class="screen active">
  <div class="container">
    <div class="card">
      <div class="soap-area">
        <div class="soap"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
      </div>

      <h1>Eminanne Sabunları</h1>
      <div class="line">Temiz ol</div>
      <div class="line">Mutlu ol</div>
      <div class="line">Doğal kal</div>

      <button onclick="goInfo()">Bilgiler için tıklayınız</button>
    </div>
  </div>
</section>

<!-- BİLGİ SAYFASI -->
<section id="infoScreen" class="screen">
  <div class="container">
    <div class="card">
      <div class="soap-area">
        <div class="soap"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
      </div>

      <h1>İletişim ve Konum</h1>
      <div class="subtitle">Doğal sabunlarımızla hizmetinizdeyiz</div>

      <div class="info-text">Saitabat Mahallesi</div>
      <div class="info-text">Şelale Caddesi</div>
      <div class="info-text">Bursa</div>

      <div class="map-wrap">
        <iframe
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps?q=Saitabat%20Mahallesi%20Şelale%20Caddesi%20Bursa&output=embed">
        </iframe>
      </div>

      <div style="margin-top:18px;">
        <button onclick="openMap()">Haritada Aç 📍</button>
        <button class="secondary" onclick="goHome()">Geri Dön</button>
      </div>
    </div>
  </div>
</section>

<script>
  function goInfo(){
    document.getElementById("homeScreen").classList.remove("active");
    document.getElementById("infoScreen").classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function goHome(){
    document.getElementById("infoScreen").classList.remove("active");
    document.getElementById("homeScreen").classList.add("active");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function openMap(){
    window.open("https://www.google.com/maps?q=Saitabat+Mahallesi+Şelale+Caddesi+Bursa", "_blank");
  }
</script>

</body>
</html>
